name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Coverage (Linux + Node 20 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: CLI smoke — feed + help
        shell: bash
        run: |
          node src/cli/index.js --help
          node src/cli/index.js feed --whatsapp ./test-data/sample-whatsapp.txt --name "Harvey"
          test -f data/SOUL.md
          test -f data/personality.json

      - name: Publint (Linux + Node 20 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        run: npx --yes publint --strict

      - name: NPM pack dry-run (Linux + Node 20 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        run: npm pack --dry-run
