name: Release

# Publishes to npm when a version tag (e.g. v0.7.0) is pushed. Requires an
# NPM_TOKEN repository secret. prepublishOnly (lint + test + publint) gates the
# publish, and npm provenance is attached via the id-token permission.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping publish."
            echo "Add the secret to enable tag-triggered releases, or publish manually."
            exit 0
          fi
          npm publish --provenance --access public
